name: Update poultry dataset

on:
  workflow_dispatch:
  schedule:
    - cron: "0 1 * * *"

jobs:
  refresh-data:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Placeholder refresh step
        run: python scripts/build_site_data.py

      - name: Commit generated files if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add public/data
          git diff --cached --quiet || git commit -m "chore: refresh processed poultry data"
